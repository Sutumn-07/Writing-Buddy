<!DOCTYPE html>
<html>
<head>
  <title>Writer Buddy</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <!-- Styles -->
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      max-width: 600px;
      margin: 40px auto;
      background-color: #fdf6f0;
      color: #333;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      color: #ff6f61;
    }

    h2 {
      color: #ff8a65;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      resize: vertical;
    }

    button {
      background-color: #ff6f61;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #ff8a65;
    }

    .section {
      margin-bottom: 30px;
      background-color: #fff2f0;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 1px 2px 5px rgba(0,0,0,0.1);
    }

    select {
      padding: 5px;
      margin-right: 10px;
      border-radius: 5px;
    }

    #microAction {
      font-weight: bold;
      font-size: 16px;
      color: #ff3d00;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #streak {
      font-weight: bold;
      color: #ff6f61;
    }
  </style>
</head>

<body>
  <h1>Writer Buddy</h1>

  <!-- Daily Check-In -->
  <div class="section">
    <h2>Daily Check-In</h2>
    <label>Mood:</label>
    <select id="mood">
      <option value="😃">😃 Happy</option>
      <option value="😐">😐 Neutral</option>
      <option value="😞">😞 Sad</option>
      <option value="😩">😩 Frustrated</option>
      <option value="😴">😴 Tired</option>
    </select><br><br>

    <label>Energy (1-5):</label>
    <select id="energy">
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select><br><br>

    <label>Motivation (1-5):</label>
    <select id="motivation">
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select><br><br>

    <label>Block:</label>
    <select id="block">
      <option value="none">None</option>
      <option value="noIdeas">No ideas</option>
      <option value="overthinking">Overthinking</option>
      <option value="tired">Tired</option>
      <option value="busy">Busy</option>
      <option value="selfDoubt">Self-doubt</option>
    </select><br><br>

    <button onclick="generateAction()">Get Micro-Action</button>
  </div>

  <!-- Micro-Action Output -->
  <div class="section">
    <h2>Micro-Action</h2>
    <p id="microAction">Your personalized writing action will appear here.</p>
  </div>

  <!-- Writing Box -->
  <div class="section">
    <h2>Low-Pressure Writing</h2>
    <textarea id="writingBox" placeholder="Write freely here..."></textarea><br>
    <button onclick="saveWriting()">Save Entry</button>
    <p id="streak">🔥 Streak: 0 days</p>
  </div>

  <!-- Script -->
  <script>
    let streak = 0;

    function generateAction() {
      const mood = document.getElementById("mood").value;
      const energy = parseInt(document.getElementById("energy").value);
      const motivation = parseInt(document.getElementById("motivation").value);
      const block = document.getElementById("block").value;

      let action = "";

      if(block === "noIdeas") {
        action = "✏️ Write 1 random sentence about a character or setting!";
      } else if(block === "overthinking") {
        action = "🖊️ Write freely for 5 minutes, no editing.";
      } else if(block === "selfDoubt") {
        action = "💪 Look at past work and rewrite 1 sentence you like.";
      } else if(block === "tired") {
        action = "🛌 Write just 1 sentence to keep streak alive.";
      } else if(block === "busy") {
        action = "⌛ Write a tiny 2-sentence scene.";
      } else {
        action = energy >= 4 ? "📝 Write for 20 minutes." : "✍️ Write 2 sentences.";
      }

      const microEl = document.getElementById("microAction");
      microEl.innerText = action;
      microEl.style.opacity = 1;
    }

    function saveWriting() {
      const content = document.getElementById("writingBox").value;
      if(content.trim() !== "") {
        streak += 1;
        document.getElementById("streak").innerText = `🔥 Streak: ${streak} days`;
        alert("Saved! Keep writing!");
        document.getElementById("writingBox").value = "";
      } else {
        alert("Write something first!");
      }
    }
  </script>
</body>
</html>
